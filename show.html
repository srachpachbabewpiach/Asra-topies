<!doctype html>
<html lang="pl">
  <head>
    <title>mObywatel</title>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="stylesheet" href="assets/show.css" />
    <link rel="stylesheet" href="assets/main.css" />
    <link rel="icon" type="image/x-icon" href="assets/images/logo.png" />
    <link rel="apple-touch-icon" href="assets/images/logo.png" />
    <link rel="shortcut icon" href="assets/images/logo.png" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=0.8, user-scalable=no"
    />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>

  <body>
    <div class="top_grid_fixed">
      <div class="action_grid_fixed">
        <img src="assets/images/back_blue.png" class="back_img_fixed" />
        <p onclick="sendTo('qr')" class="back_text_fixed">Kod QR</p>
      </div>
      <p class="title_text_fixed">Kod QR</p>
      <img src="assets/images/help.png" class="help_img_fixed" />
    </div>

    <div class="bottom_bar">
      <div class="bottom_bar_grid">
        <div class="bottom_element_grid" send="home">
          <div class="bottom_element_image home"></div>
          <p class="bottom_element_text">Pulpit</p>
        </div>
        <div class="bottom_element_grid" send="documents">
          <div class="bottom_element_image documents"></div>
          <p class="bottom_element_text">Dokumenty</p>
        </div>
        <div class="bottom_element_grid" send="services">
          <div class="bottom_element_image services"></div>
          <p class="bottom_element_text">Usługi</p>
        </div>
        <div class="bottom_element_grid" send="qr">
          <div class="bottom_element_image qr qr_open"></div>
          <p class="bottom_element_text open">Kod QR</p>
        </div>
        <div class="bottom_element_grid" send="more">
          <div class="bottom_element_image more"></div>
          <p class="bottom_element_text">Więcej</p>
        </div>
      </div>
    </div>

    <div class="container">
      <p class="show_title">Pokaż kod QR osobie, której dokument sprawdzasz</p>
      <p class="show_description">
        Gdy ta osoba zeskanuje lub wpisze kod, jej dane pojawią się na Twoim
        telefonie
      </p>
      <div class="frame">
        <img class="qr_image" src="assets/images/qr.png" />
        <p class="numbers"></p>
        <div class="loading">
          <div class="loading_bar"></div>
        </div>
        <p class="expire">
          <span class="expire_light">Kod wygaśnie za: </span
          ><span class="expire_highlight"></span>
        </p>
      </div>
      <div class="frame bottom_frame">
        <img class="frame_image" src="assets/images/flag.png" />
        <img class="frame_image" src="assets/images/eagle.png" />
      </div>
    </div>

    <script src="assets/bar.js"></script>
    <script src="assets/show.js"></script>
    <script src="assets/manifest.js"></script>
    <script src="assets/cache.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Odczytujemy zdjęcie
    const savedPhoto = localStorage.getItem('saved_image'); // to z poprzedniego kroku
    if (savedPhoto) {
        // Tu podaj klasę lub ID obrazka na stronie show.html, gdzie ma być foto
        const displayImg = document.querySelector('.photo_class_na_nowej_stronie'); 
        if(displayImg) displayImg.src = savedPhoto;
    }

    // Odczytujemy tekst
    const nameDisplay = document.querySelector('.name_class_na_nowej_stronie');
    if(nameDisplay) nameDisplay.innerText = localStorage.getItem('user_name');
});
</script>

 <script>
document.addEventListener('DOMContentLoaded', () => {
    // Pobieramy dane z pamięci
    const foto = localStorage.getItem('moje_zdjecie');
    const imie = localStorage.getItem('moje_imie');
    const nazwisko = localStorage.getItem('moje_nazwisko');

    // Wyświetlamy zdjęcie (musisz sprawdzić jaką klasę ma Twoje zdjęcie na tej stronie)
    // Jeśli na show.html Twoje zdjęcie ma klasę np. "user_photo", to użyj:
    const imgTag = document.querySelector('.upload_uploaded'); // podmień klasę jeśli inna
    if (imgTag && foto) imgTag.src = foto;

    // Wyświetlamy tekst
    const nameTag = document.querySelector('.name_display'); // podmień klasę jeśli inna
    if (nameTag) nameTag.innerText = imie + " " + nazwisko;
});
</script>
 </body>
</html>
